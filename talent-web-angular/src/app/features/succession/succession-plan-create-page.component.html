<a routerLink="/succession" class="back-link">← التعاقب</a>
<section class="page-head">
  <h1>خطة تعاقب جديدة</h1>
</section>
<div class="card form-card">
  <div class="form-grid">
    <label
      >منصب حرج
      <select class="select" [(ngModel)]="model.criticalPositionId" name="cp">
        <option value="">— اختر —</option>
        @for (p of positions(); track p.id) {
          <option [value]="p.id">حرج {{ p.id.slice(0, 8) }}… · منصب {{ p.positionId.slice(0, 8) }}…</option>
        }
      </select>
    </label>
    <label
      >دورة الأداء
      <select class="select" [(ngModel)]="model.performanceCycleId" name="cy">
        <option value="">— اختر —</option>
        @for (c of cycles(); track c.id) {
          <option [value]="c.id">{{ cycleLabel(c) }}</option>
        }
      </select>
    </label>
    <label class="full">اسم الخطة<input [(ngModel)]="model.planName" name="pn" /></label>
    <label class="full">ملاحظات<textarea rows="2" [(ngModel)]="model.notes" name="nt"></textarea></label>
  </div>
  <div class="form-actions">
    <button type="button" class="btn-primary" [disabled]="busy()" (click)="save()">{{ busy() ? '…' : 'حفظ' }}</button>
    <a routerLink="/succession" class="btn-ghost">إلغاء</a>
  </div>
</div>
