<a routerLink="/approvals" class="back-link">
  <span class="back-link__ico" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 18l-6-6 6-6" />
    </svg>
  </span>
  <span class="back-link__label">{{ 'nav.approvals' | t }}</span>
</a>
<section class="page-head">
  <h1>{{ 'approvals.create.title' | t }}</h1>
</section>
<div class="card form-card">
  <div class="form-grid">
    <label class="field">
      <span class="field__label">{{ 'approvals.create.requestType' | t }}</span>
      <select
        [ngModel]="model.requestType"
        (ngModelChange)="onRequestTypeChange($event)"
        name="rt"
      >
        <option [ngValue]="1">{{ 'approvals.type.1' | t }}</option>
        <option [ngValue]="2">{{ 'approvals.type.2' | t }}</option>
        <option [ngValue]="3">{{ 'approvals.type.3' | t }}</option>
        <option [ngValue]="4">{{ 'approvals.type.4' | t }}</option>
        <option [ngValue]="5">{{ 'approvals.type.5' | t }}</option>
        <option [ngValue]="6">{{ 'approvals.type.6' | t }}</option>
        <option [ngValue]="99">{{ 'approvals.type.99' | t }}</option>
      </select>
    </label>
    <label class="field">
      <span class="field__label">{{ 'approvals.create.relatedEntity' | t }}</span>
      <app-approval-entity-picker
        [requestType]="model.requestType"
        [(value)]="model.relatedEntityId"
      ></app-approval-entity-picker>
    </label>
    <label class="field full">
      <span class="field__label">{{ 'approvals.create.titleField' | t }}</span>
      <input [(ngModel)]="model.title" name="tl" />
    </label>
    <label class="field full">
      <span class="field__label">{{ 'approvals.create.summary' | t }}</span>
      <textarea rows="2" [(ngModel)]="model.summary" name="sm"></textarea>
    </label>
    <label class="field full">
      <span class="field__label">{{ 'approvals.create.notes' | t }}</span>
      <textarea rows="2" [(ngModel)]="model.notes" name="nt"></textarea>
    </label>
  </div>
  <div class="form-actions">
    <button type="button" class="btn-primary" [disabled]="busy()" (click)="save()">{{ busy() ? '…' : ('users.actions.save' | t) }}</button>
    <a routerLink="/approvals" class="btn-ghost">{{ 'users.actions.cancel' | t }}</a>
  </div>
</div>
