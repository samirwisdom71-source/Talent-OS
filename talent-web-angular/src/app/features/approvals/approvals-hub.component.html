<div class="page-head-row">
  <section class="page-head">
    <h1>{{ 'nav.approvals' | t }}</h1>
  </section>
  @if (auth.hasPermission(PermissionCodes.ApprovalRequestCreate)) {
    <div class="page-actions">
      <a class="btn-primary btn-primary--icon" routerLink="/approvals/create">
        <span class="btn-ico" aria-hidden="true">＋</span>
        طلب جديد
      </a>
    </div>
  }
</div>
<nav class="tabs" aria-label="Approval views">
  <a routerLink="/approvals" routerLinkActive="tabs__link--active" [routerLinkActiveOptions]="{ exact: true }">All</a>
  <a routerLink="/approvals/submitted" routerLinkActive="tabs__link--active">My submitted</a>
  <a routerLink="/approvals/assigned" routerLinkActive="tabs__link--active">My assigned</a>
</nav>
<router-outlet />
