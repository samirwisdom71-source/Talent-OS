<div class="login">
  <div class="login__panel">
    <div class="login__brand">
      <div class="login__logo">T</div>
      <h1 class="login__title">{{ 'login.title' | t }}</h1>
      <p class="login__subtitle">{{ 'login.subtitle' | t }}</p>
    </div>
    <form class="login__form" [formGroup]="form" (ngSubmit)="submit($event)">
      @if (error) {
        <div class="login__error" role="alert">{{ error }}</div>
      }
      <label class="login__field">
        <span class="login__label">{{ 'login.email' | t }}</span>
        <input
          type="email"
          formControlName="email"
          autocomplete="username"
          [attr.aria-invalid]="
            form.controls.email.invalid && form.controls.email.touched ? true : null
          "
        />
      </label>
      <label class="login__field">
        <span class="login__label">{{ 'login.password' | t }}</span>
        <input
          type="password"
          formControlName="password"
          autocomplete="current-password"
          [attr.aria-invalid]="
            form.controls.password.invalid && form.controls.password.touched ? true : null
          "
        />
      </label>
      <button class="login__submit" type="submit" [disabled]="busy" [attr.aria-busy]="busy">
        <span class="login__submit-text">{{ busy ? ('common.loading' | t) : ('login.submit' | t) }}</span>
      </button>
    </form>
    <button type="button" class="login__lang" (click)="toggleLang()">{{ 'login.lang' | t }}</button>
  </div>
</div>
