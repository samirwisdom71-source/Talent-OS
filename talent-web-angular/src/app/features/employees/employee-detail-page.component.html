<a routerLink="/employees" class="back-link">
  <span class="back-link__ico" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 18l-6-6 6-6" />
    </svg>
  </span>
  <span class="back-link__label">العودة للقائمة</span>
</a>

@if (failed()) {
  <div class="card card--muted">تعذر تحميل بيانات الموظف.</div>
} @else if (employee()) {
  <section class="page-head">
    <h1>{{ displayName(employee()!) }}</h1>
    <p class="page-head__sub">{{ employee()!.email }} · {{ employee()!.employeeNumber }}</p>
  </section>
  <div class="card grid">
    <div>
      <div class="label">Organization unit</div>
      <div class="value mono">{{ employee()!.organizationUnitId }}</div>
    </div>
    <div>
      <div class="label">Position</div>
      <div class="value mono">{{ employee()!.positionId }}</div>
    </div>
  </div>
} @else {
  <div class="skeleton detail-skel"></div>
}
