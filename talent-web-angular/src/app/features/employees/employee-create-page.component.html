<a routerLink="/employees" class="back-link">
  <span class="back-link__ico" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 18l-6-6 6-6" />
    </svg>
  </span>
  <span class="back-link__label">الموظفون</span>
</a>
<section class="page-head">
  <h1>إضافة موظف</h1>
</section>
<div class="card form-card">
  <div class="form-grid">
    <label>رقم الموظف<input [(ngModel)]="model.employeeNumber" name="en" /></label>
    <label>الاسم (عربي)<input [(ngModel)]="model.fullNameAr" name="fa" /></label>
    <label>الاسم (إنجليزي)<input [(ngModel)]="model.fullNameEn" name="fe" /></label>
    <label>البريد<input type="email" [(ngModel)]="model.email" name="em" /></label>
    <label>معرّف الوحدة التنظيمية<input [(ngModel)]="model.organizationUnitId" name="ou" /></label>
    <label>معرّف المنصب<input [(ngModel)]="model.positionId" name="po" /></label>
  </div>
  <div class="form-actions">
    <button type="button" class="btn-primary" [disabled]="busy()" (click)="save()">
      {{ busy() ? '…' : 'حفظ' }}
    </button>
    <a routerLink="/employees" class="btn-ghost">إلغاء</a>
  </div>
</div>
